services:
  orderdb:
    container_name: orderdb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - microservice-mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongoclient:
    container_name: mongoclient
    ports:
      - "27018:3000"

  redisdb:
    container_name: redisdb
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - microservice-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqldata:
    container_name: sqldata
    image: mcr.microsoft.com/mssql/server:2019-latest
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=123321Aa@
    volumes:
      - microservice-sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '123321Aa@' -Q 'SELECT 1' || exit 1
      interval: 20s
      timeout: 10s
      retries: 5

  rabbitmq:
    container_name: rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - microservice-rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  portainer:
    container_name: portainer
    restart: always
    ports:
      - "8080:8000"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  orderservice:
    container_name: microservices-order.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - OrderConnection=Server=sqldata;Database=MicroserviceOrderDB;User Id=sa;password=123321Aa@;Encrypt=False;TrustServerCertificate=true;
      - DatabaseSettings__ConnectionString=mongodb://admin:password@orderdb:27017
      - DatabaseSettings__DatabaseName=MicroserviceOrderDB
      - MicroServiceAddress__Product__Uri=http://productservice
      - Identity__Uri=http://identityservice
      - RabbitMq__Uri=amqp://guest:guest@rabbitmq:5672
      - RabbitMq__HostName=rabbitmq
    ports:
      - "7002:80"
    depends_on:
      sqldata:
        condition: service_healthy
      identityservice:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  basketservice:
    container_name: microservices-basket.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - BasketConnection=Server=sqldata;Database=MicroserviceBasketDB;User Id=SA;password=123321Aa@;Encrypt=False;TrustServerCertificate=true
      - CacheSettings__ConnectionString=redisdb:6379
      - RabbitMq__Uri=amqp://guest:guest@rabbitmq:5672
      - MicroServiceAddress__Discount__Uri=http://discountservice
      - MicroServiceAddress__DiscountGrpc__Uri=http://discountservice:81
      - Identity__Uri=http://identityservice
    ports:
      - "6002:80"
    depends_on:
      sqldata:
        condition: service_healthy
      identityservice:
        condition: service_started
      redisdb:
        condition: service_healthy

  discountservice:
    container_name: microservices-discount.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DiscountConnection=Server=sqldata;Database=MicroserviceDiscountDB;User Id=SA;password=123321Aa@;Encrypt=False;TrustServerCertificate=true
      - Kestrel__Endpoints__HTTP__Url=http://+:80
      - Kestrel__Endpoints__GRPC__Url=http://+:81
      - Kestrel__Endpoints__GRPC__Protocols=Http2
    ports:
      - "8002:80"
      - "8003:81"
    depends_on:
      sqldata:
        condition: service_healthy

  productservice:
    container_name: microservices-product.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ProductConnection=Server=sqldata;Database=MicroserviceProductDB;User Id=SA;password=123321Aa@;Encrypt=False;TrustServerCertificate=true
      - Identity__Uri=http://identityservice
    ports:
      - "11002:80"
    depends_on:
      sqldata:
        condition: service_healthy

  paymentservice.endpoint:
    container_name: microservices-payment.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - PaymentConnection=Server=sqldata;Database=MicroservicePaymentDB;User Id=SA;password=123321Aa@;Encrypt=False;TrustServerCertificate=true
      - RabbitMq__Uri=amqp://guest:guest@rabbitmq:5672
      - Identity__Uri=http://identityservice
    ports:
      - "10002:80"
    depends_on:
      sqldata:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy 
      identityservice:
        condition: service_started

  identityservice:
    container_name: microservices-identity.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - AspIdentityConnection=Server=sqldata;Database=MicroserviceAspIdentityDB;User Id=SA;password=123321Aa@;Encrypt=False;TrustServerCertificate=true
      - WebFrontend__Uri=http://microservices.web.frontend
      - AdminFrontend__Uri=http://microservices.admin.frontend
    ports:
      - "7018:80"
    depends_on:
      sqldata:
        condition: service_healthy

  apigateway.admin:
    container_name: microservices-apigateway.admin
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - Identity__Uri=http://identityservice
    ports:
      - "11023:80"
    depends_on:
      identityservice:
        condition: service_started

  apigateway.forweb:
    container_name: microservices-apigateway.forweb
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - Identity__Uri=http://identityservice
      - MicroserviceAddress__Discount__Uri=http://discountservice
      - MicroserviceAddress__DiscountGrpc__Uri=http://discountservice:81
    ports:
      - "10023:80"
    depends_on:
      identityservice:
        condition: service_started

  microservices.admin.frontend:
    container_name: microservices.admin.frontend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Identity__Uri=http://identityservice
      - MicroserviceAddress__AdminApiGateway__Uri=http://apigateway.admin
    ports:
      - "7298:80"
    depends_on:
      apigateway.admin:
        condition: service_started
      identityservice:
        condition: service_started

  microservices.web.frontend:
    container_name: microservices.web.frontend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - MicroserviceAddress__ApiGatewayForWeb__Uri=http://apigateway.forweb
      - Identity__Uri=http://identityservice
    ports:
      - "44328:80"
    depends_on:
      apigateway.forweb:
        condition: service_started
      identityservice:
        condition: service_started

volumes:
  microservice-sqldata:
  microservice-mongodata:
  microservice-redisdata:
  microservice-rabbitmqdata:
  portainer_data:
