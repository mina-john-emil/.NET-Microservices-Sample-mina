apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  labels: {{- include "ms.labels" . | nindent 4 }}
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.global.environment | quote }}

  # Identity URI — uses real VM IP so browser redirects work
  Identity__Uri: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.identity }}"

  # RabbitMQ — pod-to-pod uses K8s internal name
  RabbitMq__Uri: "amqp://guest:guest@rabbitmq-clusterip-srv:5672"
  RabbitMq__HostName: "rabbitmq-clusterip-srv"

  # MongoDB
  DatabaseSettings__DatabaseName: "MicroserviceOrderDB"

  # Redis — pod-to-pod
  CacheSettings__ConnectionString: "redis-clusterip-srv"

  # Microservice URLs — use VM IP + NodePort so browser requests work
  MicroServiceAddress__Product__Uri: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.productservice }}"
  MicroServiceAddress__Discount__Uri: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.basketservice }}"
  MicroServiceAddress__DiscountGrpc__Uri: "http://discountservice-clusterip-srv:81"
  MicroServiceAddress__AdminApiGateway__Uri: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.apigatewayadmin }}"
  MicroserviceAddress__ApiGatewayForWeb__Uri: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.apigatewayforweb }}"
