# ── Identity Service ──────────────────────────────────────────────
# All other services depend on this — it handles authentication
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identityservice-deployment
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identityservice
  template:
    metadata:
      labels:
        app: identityservice
    spec:
      containers:
        - name: identityservice
          # {{ .Values.global.registry }}/identityservice:{{ .Values.global.imageTag }}
          # = microservices/identityservice:latest
          image: "{{ .Values.global.registry }}/identityservice:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - containerPort: {{ .Values.global.appPort }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.global.appPort }}"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqldata-secret
                  key: sa-password
            - name: AspIdentityConnection
              value: "Server=sqldata-clusterip-srv,1433;Database=MicroserviceAspIdentityDB;User Id=sa;Password=$(SA_PASSWORD);Encrypt=False;TrustServerCertificate=true;"
            # WebFrontend/AdminFrontend use real VM IP so browser redirect works
            - name: WebFrontend__Uri
              value: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.webfrontend }}"
              value: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.webfrontend }}"
              value: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.webfrontend }}"
            - name: AdminFrontend__Uri
              value: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.adminfrontend }}"
              value: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.adminfrontend }}"
              value: "http://{{ .Values.global.vmIP }}:{{ .Values.nodePorts.adminfrontend }}"
          {{- include "ms.readinessProbe" . | nindent 10 }}
          {{- include "ms.livenessProbe" . | nindent 10 }}
          resources: {{- toYaml .Values.resources.medium | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: identityservice-clusterip-srv
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: identityservice
  ports:
    - port: {{ .Values.global.appPort }}
      targetPort: {{ .Values.global.appPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: identityservice-nodeport-srv
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: identityservice
  ports:
    - port: {{ .Values.global.appPort }}
      targetPort: {{ .Values.global.appPort }}
      nodePort: {{ .Values.nodePorts.identity }}
---
