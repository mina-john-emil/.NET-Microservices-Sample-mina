                configMapKeyRef:
                  name: microservices-config
                  key: RabbitMq__HostName
            - name: MicroServiceAddress__Product__Uri
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: MicroServiceAddress__Product__Uri
            - name: Identity__Uri
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: Identity__Uri
          {{- include "ms.readinessProbe" . | nindent 10 }}
          {{- include "ms.livenessProbe" . | nindent 10 }}
