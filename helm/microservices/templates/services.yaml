# ── Discount Service ──────────────────────────────────────────────
# Special: has TWO ports — 8080 for REST, 81 for gRPC
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discountservice-deployment
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discountservice
  template:
    metadata:
      labels:
        app: discountservice
    spec:
      containers:
        - name: discountservice
          image: "{{ .Values.global.registry }}/discountservice:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.global.appPort }}
            - name: grpc
              containerPort: 81
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqldata-secret
                  key: sa-password
            - name: DiscountConnection
              value: "Server=sqldata-clusterip-srv,1433;Database=MicroserviceDiscountDB;User Id=sa;Password=$(SA_PASSWORD);Encrypt=False;TrustServerCertificate=true;"
            # Kestrel serves HTTP on 8080 and gRPC on 81 simultaneously
            - name: Kestrel__Endpoints__HTTP__Url
              value: "http://+:{{ .Values.global.appPort }}"
            - name: Kestrel__Endpoints__GRPC__Url
              value: "http://+:81"
            - name: Kestrel__Endpoints__GRPC__Protocols
              value: "Http2"
          {{- include "ms.readinessProbe" . | nindent 10 }}
          {{- include "ms.livenessProbe" . | nindent 10 }}
          resources: {{- toYaml .Values.resources.medium | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: discountservice-clusterip-srv
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: discountservice
  ports:
    - name: http
      port: {{ .Values.global.appPort }}
      targetPort: {{ .Values.global.appPort }}
    - name: grpc
      port: 81
      targetPort: 81
---
