# ── MongoDB ───────────────────────────────────────────────────────
# StatefulSet gives stable pod name (mongo-deployment-0)
# so same PVC is always reattached after restart
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-deployment
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  serviceName: mongo-clusterip-srv   # links to headless service for stable DNS
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - containerPort: 27017
          env:
            # Read credentials from mongo-secret
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-root-password
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db    # where MongoDB stores data
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-clusterip-srv
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  type: ClusterIP    # only reachable inside cluster
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
---
# ── SQL Server ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sqldata-deployment
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  serviceName: sqldata-clusterip-srv
  replicas: 1
  selector:
    matchLabels:
      app: sqldata
  template:
    metadata:
      labels:
        app: sqldata
    spec:
      containers:
        - name: sqldata
          image: mcr.microsoft.com/mssql/server:2019-latest
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA      # required by Microsoft license
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqldata-secret
                  key: sa-password
          volumeMounts:
            - name: sqldata-storage
              mountPath: /var/opt/mssql
      volumes:
        - name: sqldata-storage
          persistentVolumeClaim:
            claimName: sqldata-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sqldata-clusterip-srv
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: sqldata
  ports:
    - port: 1433
      targetPort: 1433
---
# ── Redis ─────────────────────────────────────────────────────────
