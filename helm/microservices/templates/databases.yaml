---
# ── RabbitMQ ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq-deployment
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  serviceName: rabbitmq-clusterip-srv
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - containerPort: 5672    # messaging port
            - containerPort: 15672   # web UI port
          volumeMounts:
            - name: rabbitmq-storage
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-storage
          persistentVolumeClaim:
            claimName: rabbitmq-pvc
---
# ClusterIP — microservices connect here for messaging
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-clusterip-srv
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
# NodePort — access RabbitMQ UI from browser
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-nodeport-srv
  labels: {{- include "ms.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: {{ .Values.nodePorts.rabbitmqUI }}
