apiVersion: apps/v1
kind: Deployment
metadata:
  name: identityservice-deployment
  labels:
    app: identityservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identityservice
  template:
    metadata:
      labels:
        app: identityservice
    spec:
      containers:
        - name: identityservice
          image: microservices/identityservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: AspIdentityConnection
              value: "Server=sqldata-clusterip-srv,1433;Database=MicroserviceAspIdentityDB;User Id=sa;password=123321Aa@;Encrypt=False;TrustServerCertificate=true;"
            - name: WebFrontend__Uri
              value: "http://kubernetes.docker.internal:31328"
            - name: AdminFrontend__Uri
              value: "http://kubernetes.docker.internal:31298"
---
apiVersion: v1
kind: Service
metadata:
  name: identityservice-clusterip-srv
spec:
  type: ClusterIP
  selector:
    app: identityservice
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: identityservice-nodeport-srv
spec:
  type: NodePort
  selector:
    app: identityservice
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 31720
