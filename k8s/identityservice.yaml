apiVersion: apps/v1
kind: Deployment
metadata:
  name: identityservice-deployment
  labels:
    app: identityservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identityservice
  template:
    metadata:
      labels:
        app: identityservice
    spec:
      containers:
        - name: identityservice
          image: microservices/identityservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqldata-secret
                  key: sa-password
            - name: AspIdentityConnection
              value: "Server=sqldata-clusterip-srv,1433;Database=MicroserviceAspIdentityDB;User Id=sa;Password=$(SA_PASSWORD);Encrypt=False;TrustServerCertificate=true;"
            - name: WebFrontend__Uri
              value: "http://kubernetes.docker.internal:31443"
            - name: AdminFrontend__Uri
              value: "http://kubernetes.docker.internal:31298"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identityservice-clusterip-srv
spec:
  type: ClusterIP
  selector:
    app: identityservice
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: identityservice-nodeport-srv
spec:
  type: NodePort
  selector:
    app: identityservice
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 31720
