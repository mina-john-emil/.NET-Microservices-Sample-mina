apiVersion: apps/v1
kind: StatefulSet                 # changed from Deployment
metadata:
  name: sqldata-deployment
  labels:
    app: sqldata
spec:
  serviceName: sqldata-clusterip-srv  # links to service
  replicas: 1
  selector:
    matchLabels:
      app: sqldata
  template:
    metadata:
      labels:
        app: sqldata
    spec:
      containers:
        - name: sqldata
          image: mcr.microsoft.com/mssql/server:2019-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqldata-secret
                  key: sa-password
          volumeMounts:
            - name: sqldata-storage
              mountPath: /var/opt/mssql
      volumes:
        - name: sqldata-storage
          persistentVolumeClaim:
            claimName: sqldata-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sqldata-clusterip-srv
spec:
  type: ClusterIP
  selector:
    app: sqldata
  ports:
    - protocol: TCP
      port: 1433
      targetPort: 1433
